name: Update Stream Calendar

on:
  schedule:
    # This runs at 12:00 PM UTC every day (approx 5:00 AM PST)
    - cron: '0 12 * * *'
  # Allows you to manually trigger the update from the GitHub "Actions" tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Calendar Script
        env:
          # These must be set in Settings > Secrets and variables > Actions
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MESSAGE_ID: ${{ secrets.MESSAGE_ID }}
        run: python main.py
