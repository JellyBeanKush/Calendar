name: Sync Discord Calendar

on:
  schedule:
    # This triggers the bot every 15 minutes (4 times an hour)
    - cron: '*/15 * * * *'
  workflow_dispatch: # This adds a "Run Workflow" button in GitHub so you can test it manually

jobs:
  build:
    runs-on: ubuntu-latest
    
    # This permission is CRITICAL to allow the bot to save the message_id.txt
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests google-api-python-client google-auth pillow

      - name: Run Calendar Bot
        env:
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: Save and Commit Changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Add both the message ID and the updated calendar image
          git add message_id.txt out.png
          
          # Commit and push if anything changed
          git commit -m "Update calendar data and image [skip ci]" || echo "No changes to commit"
          git push
