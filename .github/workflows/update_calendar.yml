name: Update Calendar

on:
  schedule:
    - cron: '*/15 * * * *' # This means "Every 15 minutes"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client pillow requests

      - name: Run python main.py
        env:
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MESSAGE_ID: ${{ secrets.MESSAGE_ID }}
        run: python main.py

     - name: Commit and Push Message ID
        run: |
          git config --global user.name "CalendarBot"
          git config --global user.email "bot@github.com"
          git add message_id.txt
          git commit -m "Update Discord message ID [skip ci]" || echo "No changes to commit"
          git push
